<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注册管理员 | 知行成长志</title>
  <link rel="stylesheet" href="admin.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <h1><i class="fas fa-user-plus"></i> 注册管理员</h1>
      <p class="subtitle">创建博客管理账号</p>
      <form id="registerForm">
        <div class="form-group">
          <label for="regEmail">邮箱</label>
          <input type="email" id="regEmail" placeholder="you@example.com" required autofocus>
        </div>
        <div class="form-group">
          <label for="regPassword">密码</label>
          <input type="password" id="regPassword" placeholder="至少 6 位" required minlength="6">
        </div>
        <div class="form-group">
          <label for="regConfirm">确认密码</label>
          <input type="password" id="regConfirm" placeholder="再次输入密码" required>
        </div>
        <p class="form-error" id="regError" style="display:none;"></p>
        <p class="form-error" id="regSuccess" style="display:none;color:var(--admin-success);"></p>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">
          <i class="fas fa-check"></i> 注册
        </button>
      </form>
      <p style="text-align:center;margin-top:20px;font-size:.82rem;color:var(--admin-soft);">
        已有账号？<a href="admin.html" style="color:var(--admin-accent);">去登录</a>
      </p>
    </div>
  </div>

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- 数据库封装 -->
  <script src="supabase.js"></script>

  <script>
  (function () {
    var form = document.getElementById('registerForm');
    var errEl = document.getElementById('regError');
    var okEl = document.getElementById('regSuccess');

    function showError(msg) {
      errEl.textContent = msg;
      errEl.style.display = 'block';
      okEl.style.display = 'none';
    }

    function showSuccess(msg) {
      okEl.textContent = msg;
      okEl.style.display = 'block';
      errEl.style.display = 'none';
    }

    form.addEventListener('submit', async function (e) {
      e.preventDefault();
      errEl.style.display = 'none';
      okEl.style.display = 'none';

      var email = document.getElementById('regEmail').value.trim();
      var password = document.getElementById('regPassword').value;
      var confirm = document.getElementById('regConfirm').value;

      if (!email) return showError('请输入邮箱');
      if (password.length < 6) return showError('密码至少 6 位');
      if (password !== confirm) return showError('两次密码不一致');

      try {
        var client = BlogDB.getClient();
        if (!client) throw new Error('Supabase 未连接，请检查 supabase.js 配置');

        var result = await client.auth.signUp({ email: email, password: password });

        if (result.data.user) {
          if (result.data.session) {
            // 邮箱确认已跳过（Supabase 设置中关了邮件确认）
            showSuccess('注册成功！3 秒后跳转到管理后台...');
            setTimeout(function () { window.location.href = 'admin.html'; }, 3000);
          } else {
            // 需要去邮箱确认
            showSuccess('注册成功！请检查邮箱 "' + email + '" 中的确认链接，确认后即可登录。');
          }
        }
      } catch (err) {
        if (err.message && err.message.includes('already registered')) {
          showError('该邮箱已注册，请直接登录');
        } else {
          showError('注册失败：' + (err.message || '未知错误'));
        }
      }
    });
  })();
  </script>
</body>
</html>
