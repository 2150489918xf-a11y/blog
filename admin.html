<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理后台 | 知行成长志</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="admin.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <!-- ============ 登录页面 ============ -->
  <div id="loginScreen" class="login-wrapper">
    <div class="login-card">
      <h1><i class="fas fa-feather"></i> 知行成长志</h1>
      <p class="subtitle">管理后台 · 请登录</p>
      <form id="loginForm">
        <div class="form-group">
          <label for="loginEmail">邮箱</label>
          <input type="email" id="loginEmail" placeholder="admin@example.com" required>
        </div>
        <div class="form-group">
          <label for="loginPassword">密码</label>
          <input type="password" id="loginPassword" placeholder="至少 6 位" required>
        </div>
        <p class="form-error" id="loginError" style="display:none;"></p>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">
          <i class="fas fa-arrow-right-to-bracket"></i> 登录
        </button>
      </form>
<p style="text-align:center;margin-top:20px;font-size:.82rem;color:var(--admin-soft);">
         <a href="index.html" style="color:var(--admin-soft);">&#8592; 返回首页</a>
       </p>
    </div>
  </div>

  <!-- ============ 管理面板 ============ -->
  <div id="adminPanel" style="display:none;">
    <!-- 顶栏 -->
    <header class="admin-header">
      <div class="admin-shell admin-header-inner">
        <a class="admin-brand" href="index.html">
          <i class="fas fa-feather"></i> 知行成长志 · 管理后台
        </a>
        <div class="admin-user">
          <span class="user-email" id="adminEmail"></span>
          <button class="btn btn-ghost btn-sm" id="btnLogout"><i class="fas fa-sign-out-alt"></i> 退出</button>
        </div>
      </div>
    </header>

    <main class="admin-shell" style="padding-top:28px;padding-bottom:56px;">
      <!-- 工具栏 -->
      <div class="card-header">
        <h2><i class="fas fa-newspaper"></i> 文章管理</h2>
        <button class="btn btn-primary" id="btnNewArticle"><i class="fas fa-plus"></i> 新建文章</button>
      </div>

      <!-- 文章列表 -->
      <div class="admin-card" id="articleListCard">
        <div id="articleListContainer">
          <p style="color:var(--admin-soft);text-align:center;padding:40px;">正在加载文章列表...</p>
        </div>
      </div>

      <!-- 文章编辑器（默认隐藏） -->
      <div class="admin-card" id="editorCard" style="display:none;">
        <div class="card-header">
          <h2 id="editorTitle"><i class="fas fa-pen-to-square"></i> 编辑文章</h2>
          <div style="display:flex;gap:8px;">
            <button class="btn btn-outline" id="btnCancelEdit"><i class="fas fa-times"></i> 取消</button>
            <button class="btn btn-primary" id="btnSaveArticle"><i class="fas fa-check"></i> 保存</button>
          </div>
        </div>

        <form id="articleForm">
          <input type="hidden" id="articleId" value="">

          <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
            <div class="form-group">
              <label for="articleTitle">标题 *</label>
              <input type="text" id="articleTitle" placeholder="文章标题" required>
            </div>
            <div class="form-group">
              <label for="articleSlug">URL 别名</label>
              <input type="text" id="articleSlug" placeholder="my-article-slug">
            </div>
          </div>

          <div class="form-group">
            <label for="articleSummary">摘要</label>
            <textarea id="articleSummary" placeholder="一句话描述文章内容" style="min-height:60px;"></textarea>
          </div>

          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;">
            <div class="form-group">
              <label for="articleCategory">分类</label>
              <input type="text" id="articleCategory" placeholder="如：课程设计" list="categoryList">
              <datalist id="categoryList"></datalist>
            </div>
            <div class="form-group">
              <label for="articleReadTime">阅读时长（分钟）</label>
              <input type="number" id="articleReadTime" value="5" min="1" max="60">
            </div>
            <div class="form-group">
              <label for="articleCover">封面图片 URL</label>
              <input type="url" id="articleCover" placeholder="https://...">
            </div>
          </div>

          <div class="form-group">
            <label>标签</label>
            <div class="tag-input-wrapper" id="tagWrapper">
              <input type="text" class="tag-input" id="tagInput" placeholder="输入标签后按回车">
            </div>
          </div>

          <!-- 拖拽上传 -->
          <div class="drop-zone" id="dropZone">
            <i class="fas fa-cloud-arrow-up"></i>
            <span>拖拽图片到这里上传，或点击选择文件</span>
            <input type="file" id="fileInput" accept="image/*" style="display:none;" multiple>
          </div>

          <!-- Markdown 编辑器 -->
          <label style="display:block;font-weight:600;margin-bottom:8px;">正文（Markdown）</label>
          <div class="editor-layout">
            <textarea class="editor-input" id="mdInput" placeholder="在这里写 Markdown...&#10;&#10;## 二级标题&#10;&#10;**加粗文字** *斜体*&#10;&#10;- 列表项"></textarea>
            <div class="editor-preview" id="mdPreview"></div>
          </div>

          <div style="display:flex;align-items:center;gap:12px;margin-top:16px;">
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-weight:600;">
              <input type="checkbox" id="articlePublished" checked> 发布（公开可见）
            </label>
          </div>
        </form>
      </div>
    </main>

    <!-- Toast 容器 -->
    <div class="toast-container" id="toastContainer"></div>
  </div>

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- 数据库封装 -->
  <script src="supabase.js"></script>
  <!-- 管理后台逻辑 -->
  <script>
  (function () {
    var $loginScreen = document.getElementById('loginScreen');
    var $adminPanel = document.getElementById('adminPanel');
    var $loginForm = document.getElementById('loginForm');
    var $loginError = document.getElementById('loginError');
    var $adminEmail = document.getElementById('adminEmail');
    var $articleListContainer = document.getElementById('articleListContainer');
    var $editorCard = document.getElementById('editorCard');
    var $articleListCard = document.getElementById('articleListCard');
    var $btnNewArticle = document.getElementById('btnNewArticle');
    var $btnCancelEdit = document.getElementById('btnCancelEdit');
    var $btnSaveArticle = document.getElementById('btnSaveArticle');
    var $btnLogout = document.getElementById('btnLogout');
    var $mdInput = document.getElementById('mdInput');
    var $mdPreview = document.getElementById('mdPreview');
    var $dropZone = document.getElementById('dropZone');
    var $fileInput = document.getElementById('fileInput');
    var $tagInput = document.getElementById('tagInput');
    var $tagWrapper = document.getElementById('tagWrapper');
    var $toastContainer = document.getElementById('toastContainer');
    var currentTags = [];

    function $(id) { return document.getElementById(id); }

    function toast(msg, type) {
      type = type || 'info';
      var el = document.createElement('div');
      el.className = 'toast ' + type;
      el.textContent = msg;
      $toastContainer.appendChild(el);
      setTimeout(function () { el.remove(); }, 3500);
    }

    function md2html(md) {
      if (!md) return '';
      var html = md
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">')
        .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>')
        .replace(/^#### (.+)$/gm, '<h4>$1</h4>')
        .replace(/^### (.+)$/gm, '<h3>$1</h3>')
        .replace(/^## (.+)$/gm, '<h2>$1</h2>')
        .replace(/^# (.+)$/gm, '<h1>$1</h1>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
        .replace(/^- (.+)$/gm, '<li>$1</li>')
        .replace(/(<li>[\s\S]*?<\/li>)/g, function (m) { return '<ul>' + m + '</ul>'; })
        .replace(/\n\n/g, '</p><p>');
      return '<p>' + html + '</p>';
    }

    function renderTags() {
      var pills = $tagWrapper.querySelectorAll('.tag-pill');
      pills.forEach(function (p) { p.remove(); });
      currentTags.forEach(function (tag, idx) {
        var pill = document.createElement('span');
        pill.className = 'tag-pill';
        pill.innerHTML = tag + ' <span class="tag-remove" data-idx="' + idx + '">&times;</span>';
        $tagWrapper.insertBefore(pill, $tagInput);
      });
    }

    $tagWrapper.addEventListener('click', function (e) {
      if (e.target.classList.contains('tag-remove')) {
        currentTags.splice(parseInt(e.target.dataset.idx), 1);
        renderTags();
      }
    });

    $tagInput.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        var val = $tagInput.value.trim();
        if (val && currentTags.indexOf(val) === -1) { currentTags.push(val); renderTags(); }
        $tagInput.value = '';
      }
    });

    $dropZone.addEventListener('click', function () { $fileInput.click(); });
    $fileInput.addEventListener('change', function (e) {
      Array.from(e.target.files).forEach(uploadFile);
    });

    $dropZone.addEventListener('dragover', function (e) { e.preventDefault(); $dropZone.classList.add('drag-over'); });
    $dropZone.addEventListener('dragleave', function () { $dropZone.classList.remove('drag-over'); });
    $dropZone.addEventListener('drop', function (e) {
      e.preventDefault(); $dropZone.classList.remove('drag-over');
      Array.from(e.dataTransfer.files).forEach(uploadFile);
    });

    async function uploadFile(file) {
      if (!file.type.startsWith('image/')) return;
      toast('正在上传 ' + file.name + '...', 'info');
      try {
        var url = await BlogDB.uploadImage(file);
        $mdInput.value += '\n![' + file.name + '](' + url + ')\n';
        updatePreview();
        toast('上传成功', 'success');
      } catch (err) { toast('上传失败: ' + err.message, 'error'); }
    }

    function updatePreview() { $mdPreview.innerHTML = md2html($mdInput.value); }
    $mdInput.addEventListener('input', updatePreview);

    async function loadArticleList() {
      $articleListContainer.innerHTML = '<p style="color:var(--admin-soft);text-align:center;padding:40px;">加载中...</p>';
      try {
        var articles = await BlogDB.getAllArticles();
        if (articles.length === 0) {
          $articleListContainer.innerHTML = '<p style="color:var(--admin-soft);text-align:center;padding:40px;">还没有文章，点击上方「新建文章」开始创作。</p>';
          return;
        }
        var rows = articles.map(function (a) {
          return '<tr>' +
            '<td class="title-cell">' + esc(a.title) + '</td>' +
            '<td>' + esc(a.category || '未分类') + '</td>' +
            '<td><span class="status-dot ' + (a.published ? 'published' : 'draft') + '"></span>' + (a.published ? '已发布' : '草稿') + '</td>' +
            '<td>' + fmtDate(a.created_at) + '</td>' +
            '<td><div class="action-group">' +
              '<button onclick="window._edit(\'' + a.id + '\')"><i class="fas fa-pen"></i></button>' +
              '<button onclick="window._toggle(\'' + a.id + '\',' + a.published + ')"><i class="fas fa-' + (a.published ? 'eye-slash' : 'eye') + '"></i></button>' +
              '<button class="danger" onclick="window._del(\'' + a.id + '\')"><i class="fas fa-trash"></i></button>' +
            '</div></td></tr>';
        }).join('');
        $articleListContainer.innerHTML = '<table class="article-table"><thead><tr><th>标题</th><th>分类</th><th>状态</th><th>时间</th><th>操作</th></tr></thead><tbody>' + rows + '</tbody></table>';
      } catch (err) {
        $articleListContainer.innerHTML = '<p style="color:var(--admin-danger);text-align:center;padding:40px;">加载失败: ' + err.message + '</p>';
      }
    }

    function esc(s) { if (!s) return ''; return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function fmtDate(d) { if (!d) return ''; var t = new Date(d); return t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0')+'-'+String(t.getDate()).padStart(2,'0'); }

    function showEditor(article) {
      $editorCard.style.display = 'block'; $articleListCard.style.display = 'none'; currentTags = [];
      if (article) {
        $('articleId').value = article.id; $('articleTitle').value = article.title || '';
        $('articleSlug').value = article.slug || ''; $('articleSummary').value = article.summary || '';
        $('articleCategory').value = article.category || ''; $('articleReadTime').value = article.read_time || 5;
        $('articleCover').value = article.cover_url || ''; $mdInput.value = article.content || '';
        $('articlePublished').checked = article.published !== false; currentTags = article.tags || [];
        document.getElementById('editorTitle').innerHTML = '<i class="fas fa-pen-to-square"></i> 编辑文章';
      } else {
        $('articleId').value = ''; $('articleTitle').value = ''; $('articleSlug').value = '';
        $('articleSummary').value = ''; $('articleCategory').value = ''; $('articleReadTime').value = 5;
        $('articleCover').value = ''; $mdInput.value = ''; $('articlePublished').checked = true; currentTags = [];
        document.getElementById('editorTitle').innerHTML = '<i class="fas fa-plus"></i> 新建文章';
      }
      renderTags(); updatePreview();
    }

    function hideEditor() { $editorCard.style.display = 'none'; $articleListCard.style.display = 'block'; }

    async function saveArticle() {
      var article = {
        title: $('articleTitle').value.trim(), slug: $('articleSlug').value.trim(),
        summary: $('articleSummary').value.trim(), content: $mdInput.value,
        cover_url: $('articleCover').value.trim(), category: $('articleCategory').value.trim(),
        tags: currentTags, read_time: parseInt($('articleReadTime').value) || 5,
        published: $('articlePublished').checked
      };
      if (!article.title) { toast('请输入文章标题', 'error'); return; }
      if (!article.slug) article.slug = article.title.toLowerCase().replace(/\s+/g, '-').replace(/[^\w-]/g, '');
      try {
        var id = $('articleId').value;
        if (id) { await BlogDB.updateArticle(id, article); toast('文章更新成功', 'success'); }
        else { await BlogDB.createArticle(article); toast('文章创建成功', 'success'); }
        hideEditor(); await loadArticleList();
      } catch (err) { toast('保存失败: ' + err.message, 'error'); }
    }

    window._edit = async function (id) {
      var articles = await BlogDB.getAllArticles();
      var a = articles.find(function (x) { return x.id === id; });
      if (a) showEditor(a);
    };
    window._toggle = async function (id, cur) { await BlogDB.togglePublish(id, !cur); toast(cur ? '已设为草稿' : '已发布', 'success'); await loadArticleList(); };
    window._del = async function (id) { if (!confirm('确定删除？')) return; await BlogDB.deleteArticle(id); toast('已删除', 'success'); await loadArticleList(); };

    $loginForm.addEventListener('submit', async function (e) {
      e.preventDefault(); $loginError.style.display = 'none';
      try { await BlogDB.adminLogin($('loginEmail').value.trim(), $('loginPassword').value); await showAdmin(); }
      catch (err) { $loginError.textContent = err.message; $loginError.style.display = 'block'; }
    });

    $btnLogout.addEventListener('click', async function () { await BlogDB.adminLogout(); showLogin(); });

    function showLogin() { $loginScreen.style.display = 'grid'; $adminPanel.style.display = 'none'; }
    async function showAdmin() {
      $loginScreen.style.display = 'none'; $adminPanel.style.display = 'block';
      var s = await BlogDB.checkAuth(); if (s) $adminEmail.textContent = s.user.email;
      await loadArticleList();
    }

    $btnNewArticle.addEventListener('click', function () { showEditor(null); });
    $btnCancelEdit.addEventListener('click', hideEditor);
    $btnSaveArticle.addEventListener('click', saveArticle);

    (async function boot() {
      try { var s = await BlogDB.checkAuth(); if (s) await showAdmin(); else showLogin(); }
      catch (_) { showLogin(); }
    })();
  })();
  </script>
</body>
</html>
