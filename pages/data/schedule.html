<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>表格展示 | 知行成长笔记</title>
  <link rel="stylesheet" href="../../assets/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body data-page="data" data-root="../..">

  <main>
    <section class="page-hero shell">
      <div class="panel">
        <div class="breadcrumbs"><a href="../../index.html">首页</a><span>/</span><span>表格展示</span></div>
        <p class="eyebrow">指定页面类型。</p>
        <h1>学习计划与课程安排表</h1>
        <p class="hero-summary">该页通过可视化表格展示学习计划、课程安排与完成状态，用于体现信息组织与表格样式能力。</p>
      </div>
    </section>

    <div class="shell page-layout">
      <div class="content-stack">
        <section class="panel table-card">
          <p class="section-kicker">表格展示</p>
          <h2>本周前端学习任务</h2>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>任务</th>
                  <th>时间安排</th>
                  <th>目标</th>
                  <th>状。</th>
                </tr>
              </thead>
              <tbody id="scheduleTableBody"></tbody>
            </table>
          </div>
        </section>
      </div>

      <aside class="side-column">
        <div class="side-sticky-stack">
          <section class="panel toc-card">
            <p class="section-kicker">说明</p>
            <h2>本页实现要点</h2>
            <ul class="check-list">
              <li>表格行由脚本动态渲染</li>
              <li>状态标签颜色区分明确</li>
              <li>小屏幕下支持横向滚动</li>
            </ul>
          </section>
        </div>
      </aside>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../../assets/js/supabase-core.js" defer></script>
  <script src="../../assets/js/supabase.js" defer></script>
  <script src="../../assets/js/data-layer.js" defer></script>
  <script src="../../assets/js/page-sections.js" defer></script>
  <script src="../../assets/js/profile-renderer.js" defer></script>
  <script src="../../assets/js/script.js" defer></script>
  <script src="../../assets/js/common.js" defer></script>
</body>
</html>
