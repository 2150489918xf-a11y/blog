<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>资源导航 | 个人博客</title>
  <link rel="stylesheet" href="../../assets/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body data-page="resources" data-root="../..">

  <main>
    <section class="page-hero shell">
      <div class="panel hero-glass">
        <div class="breadcrumbs"><a href="../../index.html">首页</a><span>/</span><span>资源导航</span></div>
        <p class="eyebrow" id="resourcesHeroKicker">Resource Navigation</p>
        <h1 id="resourcesHeroTitle">资源导航</h1>
        <p class="hero-summary" id="resourcesHeroSummary">按学习场景分类整理的常用网站和工具，涵盖语法文档、学习平台、开发工具和设计灵感，方便日常开发时快速查阅。</p>
      </div>
    </section>

    <div class="shell page-layout">
      <div class="content-stack">
        <div id="resourceGroups"></div>
      </div>

      <aside class="side-column">
        <div class="side-sticky-stack">
          <section class="panel toc-card">
            <p class="section-kicker" id="resourceJumpKicker">分类索引</p>
            <h2 id="resourceJumpTitle">快速跳转</h2>
            <ul class="check-list" id="resourceJumpList"></ul>
          </section>

          <section class="panel toc-card">
            <p class="section-kicker" id="resourceGuideKicker">使用建议</p>
            <h2 id="resourceGuideTitle">怎么用这些资源</h2>
            <div class="prose" id="resourceGuideBody">
              <p>遇到具体语法问题先查 MDN，需要看整体用法时去菜鸟教程。</p>
              <p>样式没灵感就翻 Dribbble，颜色拿不准就去 Color Hunt 找现成方案。</p>
              <p>写完代码想快速验证，CodePen 比本地起服务更方便。</p>
            </div>
          </section>
        </div>
      </aside>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../../assets/js/supabase-core.js" defer></script>
  <script src="../../assets/js/supabase.js" defer></script>
  <script src="../../assets/js/data-layer.js" defer></script>
  <script src="../../assets/js/page-sections.js" defer></script>
  <script src="../../assets/js/profile-renderer.js" defer></script>
  <script src="../../assets/js/script.js" defer></script>
  <script src="../../assets/js/common.js" defer></script>
</body>
</html>
