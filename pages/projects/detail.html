<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>项目详情</title>
  <link rel="stylesheet" href="../../assets/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body data-page="project-detail" data-root="../..">

  <main class="page-main">
    <div class="shell article-shell">
      <article class="panel article-reader">
        <header class="article-reader-header">
          <div class="breadcrumbs">
            <a href="../../index.html">首页</a><span>/</span>
            <a href="./index.html">实战教程</a><span>/</span>
            <span id="detailBreadcrumb">加载中...</span>
          </div>
          <span class="chip" id="detailStatus">Project</span>
          <h1 id="detailTitle">加载中...</h1>
          <div class="article-meta" id="detailMeta"></div>
          <div id="detailLinks" style="display:flex;gap:12px;margin-top:18px;flex-wrap:wrap;"></div>
        </header>

        <div class="article-prose" id="detailBody">
          <p>正在加载项目详情...</p>
        </div>
      </article>

      <aside class="panel article-outline">
        <p class="section-kicker">项目信息</p>
        <h2 class="aside-card-title">技术标签</h2>
        <div id="detailTags" style="display:flex;flex-wrap:wrap;gap:8px;"></div>
        <div class="widget-stat-block" style="margin-top:24px;">
          <strong>返回列表</strong>
          <p><a class="text-link" href="./index.html">查看全部实战教程</a></p>
        </div>
      </aside>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../../assets/js/supabase-core.js" defer></script>
  <script src="../../assets/js/supabase.js" defer></script>
  <script>
    document.addEventListener('DOMContentLoaded', async function () {
      var params = new URLSearchParams(window.location.search);
      var slug = params.get('slug');
      if (!slug) { document.getElementById('detailTitle').textContent = '未指定项目'; return; }

      try {
        var projects = await BlogDB.getPublishedProjects();
        var project = (projects || []).find(function (p) { return p.slug === slug; });
        if (!project) {
          document.getElementById('detailTitle').textContent = '项目未找到';
          document.getElementById('detailBody').innerHTML = '<p>找不到该项目，可能已被删除或隐藏。</p>';
          return;
        }

        // 页面标题
        document.title = project.title + ' | 项目详情';
        document.getElementById('detailBreadcrumb').textContent = project.title;
        document.getElementById('detailStatus').textContent = project.status || 'Project';
        document.getElementById('detailTitle').textContent = project.title;

        // 元信息
        var date = project.created_at ? new Date(project.created_at).toISOString().slice(0, 10) : '';
        document.getElementById('detailMeta').innerHTML = date ? '<span><i class="far fa-calendar-alt"></i> ' + date + '</span>' : '';

        // 描述正文（Markdown 渲染，复用文章样式）
        if (project.description) {
          var md = project.description
            .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
            .replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1" style="max-width:100%;border-radius:8px;">')
            .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
            .replace(/^#### (.+)$/gm, '<h4>$1</h4>')
            .replace(/^### (.+)$/gm, '<h3>$1</h3>')
            .replace(/^## (.+)$/gm, '<h2>$1</h2>')
            .replace(/^# (.+)$/gm, '<h1>$1</h1>')
            .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
            .replace(/\*(.+?)\*/g, '<em>$1</em>')
            .replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>')
            .replace(/^- (.+)$/gm, '<li>$1</li>')
            .replace(/\n\n/g, '</p><p>')
            .replace(/\n/g, '<br>');
          document.getElementById('detailBody').innerHTML = '<p>' + md + '</p>';
        } else {
          document.getElementById('detailBody').innerHTML = '<p style="color:var(--text-soft);">暂无详细介绍，请在管理后台补充项目描述。</p>';
        }

        // 技术标签
        var tagsHtml = (project.tech_tags || []).map(function (t) {
          return '<span class="badge">' + t + '</span>';
        }).join('');
        document.getElementById('detailTags').innerHTML = tagsHtml || '<span style="color:var(--text-soft);">暂无标签</span>';

        // 演示 / 仓库链接（新标签页打开）
        var links = [];
        if (project.demo_url) {
          var dh = /^https?:\/\//i.test(project.demo_url) ? project.demo_url : 'https://' + project.demo_url;
          links.push('<a href="' + dh + '" target="_blank" rel="noopener" class="button-primary" style="display:inline-flex;align-items:center;gap:8px;padding:10px 24px;text-decoration:none;"><i class="fas fa-external-link-alt"></i> 演示链接</a>');
        }
        if (project.repo_url) {
          var rh = /^https?:\/\//i.test(project.repo_url) ? project.repo_url : 'https://' + project.repo_url;
          links.push('<a href="' + rh + '" target="_blank" rel="noopener" class="button-primary" style="display:inline-flex;align-items:center;gap:8px;padding:10px 24px;text-decoration:none;background:rgba(36,41,46,0.9);"><i class="fab fa-github"></i> 仓库链接</a>');
        }
        document.getElementById('detailLinks').innerHTML = links.join('');
      } catch (err) {
        document.getElementById('detailTitle').textContent = '加载失败';
        document.getElementById('detailBody').innerHTML = '<p>加载项目详情失败，请稍后重试。</p>';
      }
    });
  </script>
  <script src="../../assets/js/common.js" defer></script>
</body>
</html>
