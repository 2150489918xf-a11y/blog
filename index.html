<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>熊帆的成长笔记 | 个人作品集学习博客</title>
  <meta name="description" content="计算机专业学生的个人作品集与学习博客，展示课程项目、前端笔记、校园成长和资源导航。">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%2349b1f5'/%3E%3Cpath d='M20 42V18h8v24h-8Zm16 0V18h8v24h-8Z' fill='white'/%3E%3Ccircle cx='32' cy='32' r='26' fill='none' stroke='white' stroke-width='4' opacity='.38'/%3E%3C/svg%3E" type="image/svg+xml">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body data-page="home">
  <div class="bg-animated" aria-hidden="true"></div>
  <div class="shape shape1" aria-hidden="true"></div>
  <div class="shape shape2" aria-hidden="true"></div>
  <div class="shape shape3" aria-hidden="true"></div>

  <header class="site-header">
    <div class="shell site-header-inner">
      <a class="brand" href="./index.html" aria-label="返回首页">
        <span class="brand-mark">X</span>
        <span class="brand-copy">
          <strong>熊帆的博客</strong>
          <small>课程设计作品集</small>
        </span>
      </a>

      <nav class="site-nav" aria-label="主导航">
        <ul class="menu-list">
          <li><a class="menu-link" href="./index.html" data-nav-page="home"><i class="fas fa-home"></i> 首页</a></li>
          <li><a class="menu-link" href="./pages/articles/index.html" data-nav-page="articles"><i class="fas fa-book"></i> 学习笔记</a></li>
          <li><a class="menu-link" href="./pages/projects/index.html" data-nav-page="projects"><i class="fas fa-graduation-cap"></i> 实战教程</a></li>
          <li><a class="menu-link" href="./pages/resources/links.html" data-nav-page="resources"><i class="fas fa-folder-open"></i> 资源导航</a></li>
          <li><a class="menu-link" href="./pages/about/contact.html" data-nav-page="contact"><i class="fas fa-comments"></i> 互动交流</a></li>
          <li><a class="menu-link" href="./pages/profile/resume.html" data-nav-page="resume"><i class="fas fa-info-circle"></i> 关于</a></li>
        </ul>
      </nav>

      <div class="clock-panel" id="siteClock" aria-live="polite">正在加载时间...</div>
    </div>
  </header>

  <main class="home-main">
    <section class="shell home-stage">
      <div class="main-column">
        <section class="panel note-board">
          <div class="board-heading">
            <div>
              <p class="section-kicker" id="homeRecentKicker">最近更新</p>
              <h2 id="homeRecentTitle">学习动态速览</h2>
            </div>
            <a class="text-link" href="./pages/articles/index.html" id="homeRecentLink">进入文章列表</a>
          </div>

          <div class="note-grid" id="homeNoteGrid">
            <!-- 由 Supabase 动态加载内容 -->
            <div class="loading-placeholder">正在加载精选内容...</div>
          </div>
        </section>
        <section class="panel feature-panel">
          <div class="board-heading feature-heading">
            <div>
              <p class="section-kicker" id="homeFeatureKicker">精选文章</p>
              <h2 id="homeFeatureTitle">首页轮播与主内容流</h2>
            </div>
          </div>

          <section class="hero-carousel" id="heroCarousel" aria-label="首页轮播">
            <div class="carousel-track" id="heroCarouselTrack">
              <!-- 由 Supabase 动态加载轮播 -->
            </div>

            <div class="carousel-controls">
              <button class="carousel-button" type="button" data-carousel-prev aria-label="上一张">‹</button>
              <div class="carousel-dots" id="heroCarouselDots" aria-label="轮播位置"></div>
              <button class="carousel-button" type="button" data-carousel-next aria-label="下一张">›</button>
            </div>
          </section>
        </section>

        <section class="panel schedule-panel" id="schedulePanel">
          <div class="board-heading">
            <div>
              <p class="section-kicker"><i class="fas fa-calendar-alt"></i> 学习计划</p>
              <h2>课程学习路线图</h2>
            </div>
          </div>
          <div class="schedule-roadmap" id="scheduleRoadmap">
            <div class="loading-placeholder">正在加载学习计划...</div>
          </div>
        </section>

        <section class="panel feed-panel">
          <div class="board-heading">
            <div>
              <p class="section-kicker" id="homeFeedKicker">最新文章</p>
              <h2 id="homeFeedTitle">课程设计主内容流</h2>
            </div>
            <a class="text-link" href="./pages/articles/index.html" id="homeFeedLink">查看全部</a>
          </div>
          <div class="article-list home-article-list" id="articleList"></div>
        </section>
      </div>

      <aside class="side-column">
        <div class="side-sticky-stack">
        <!-- 作者卡片移到侧边栏顶部 -->
        <aside class="panel profile-hero-card butterfly-author">
          <div class="author-cover">
            <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 800 320'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%2357c6e1'/%3E%3Cstop offset='0.52' stop-color='%23b49fda'/%3E%3Cstop offset='1' stop-color='%23eea2a2'/%3E%3C/linearGradient%3E%3Cfilter id='b'%3E%3CfeGaussianBlur stdDeviation='18'/%3E%3C/filter%3E%3C/defs%3E%3Crect width='800' height='320' fill='url(%23g)'/%3E%3Ccircle cx='150' cy='92' r='120' fill='white' opacity='.22' filter='url(%23b)'/%3E%3Ccircle cx='640' cy='235' r='150' fill='%234954e6' opacity='.18' filter='url(%23b)'/%3E%3Cpath d='M470 60l120 200H350z' fill='%23fdd663' opacity='.42'/%3E%3Cpath d='M0 250c140-80 250-80 380 0s270 86 420-6v76H0z' fill='white' opacity='.3'/%3E%3C/svg%3E" alt="author background">
          </div>
          <div class="avatar-hero" aria-hidden="true">
            <img class="avatar-art" src="images/avatar.jpg" alt="avatar" id="homeAuthorAvatar">
          </div>
          <h2 id="homeAuthorName"></h2>
          <p id="homeAuthorBio"></p>

            <div class="profile-hero-stats">
              <div><span>文章</span><strong data-stat-key="articleCount">0</strong></div>
              <div><span>分类</span><strong data-stat-key="categoryCount">0</strong></div>
              <div><span>标签</span><strong data-stat-key="tagCount">0</strong></div>
              <div><span>时间轴</span><strong data-stat-key="timelineCount">0</strong></div>
            </div>

          <div class="profile-hero-links butterfly-social" id="homeAuthorSocials"></div>
        </aside>

        <section class="panel side-widget butterfly-widget sidebar-directory-card" aria-label="博客侧栏目录">
          <div class="widget-icon-row" role="tablist" aria-label="侧栏内容切换">
            <button class="widget-icon is-active" type="button" role="tab" aria-selected="true" aria-controls="sidebarArticles" data-sidebar-tab="articles">
              <i class="fas fa-file-alt" aria-hidden="true"></i>
              <span class="sr-only">文章</span>
            </button>
            <button class="widget-icon" type="button" role="tab" aria-selected="false" aria-controls="sidebarCategories" data-sidebar-tab="categories">
              <i class="fas fa-th-large" aria-hidden="true"></i>
              <span class="sr-only">分类</span>
            </button>
            <button class="widget-icon" type="button" role="tab" aria-selected="false" aria-controls="sidebarTags" data-sidebar-tab="tags">
              <i class="fas fa-tags" aria-hidden="true"></i>
              <span class="sr-only">标签</span>
            </button>
            <button class="widget-icon" type="button" role="tab" aria-selected="false" aria-controls="sidebarTimeline" data-sidebar-tab="timeline">
              <i class="fas fa-clock" aria-hidden="true"></i>
              <span class="sr-only">时间轴</span>
            </button>
          </div>

          <div class="sidebar-tab-panel is-active" id="sidebarArticles" role="tabpanel" data-sidebar-panel="articles">
            <h2><i class="fas fa-file-alt" aria-hidden="true"></i> <span id="sidebarArticleCount">0</span> 文章</h2>
            <div class="sidebar-gradient-line" aria-hidden="true"></div>
            <ul class="sidebar-article-list" id="sidebarArticleList"></ul>
          </div>

          <div class="sidebar-tab-panel" id="sidebarCategories" role="tabpanel" hidden data-sidebar-panel="categories">
            <h2><i class="fas fa-th-large" aria-hidden="true"></i> <span id="sidebarCategoryCount">0</span> 分类</h2>
            <div class="sidebar-gradient-line" aria-hidden="true"></div>
            <div class="sidebar-pill-cloud" id="sidebarCategoryList"></div>
          </div>

          <div class="sidebar-tab-panel" id="sidebarTags" role="tabpanel" hidden data-sidebar-panel="tags">
            <h2><i class="fas fa-tags" aria-hidden="true"></i> <span id="sidebarTagCount">0</span> 标签</h2>
            <div class="sidebar-gradient-line" aria-hidden="true"></div>
            <div class="sidebar-pill-cloud compact" id="sidebarTagList"></div>
          </div>

          <div class="sidebar-tab-panel" id="sidebarTimeline" role="tabpanel" hidden data-sidebar-panel="timeline">
            <h2><i class="fas fa-clock" aria-hidden="true"></i> <span id="sidebarTimelineCount">0</span> 时间轴</h2>
            <div class="sidebar-gradient-line" aria-hidden="true"></div>
            <ol class="sidebar-timeline-list" id="sidebarTimelineList"></ol>
          </div>
        </section>
        </div>
      </aside>
    </section>
  </main>


  <button class="back-to-top butterfly-totop" id="backToTop" type="button" aria-label="返回顶部">
    <i class="fas fa-arrow-up"></i>
  </button>

  <!-- Supabase SDK（数据库驱动的文章系统） -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js" defer></script>
  <script src="script.js" defer></script>
</body>
</html>
